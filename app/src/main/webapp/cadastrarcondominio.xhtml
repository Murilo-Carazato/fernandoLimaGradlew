<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html
	PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://java.sun.com/jsf/core" xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets" xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
	<title>Cadastro de condominio</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</h:head>
<h:body>
	<h:form id="formulario">
		<h:outputLabel value="Cadastro de Condomínio"></h:outputLabel>
		<h:messages globalOnly="true"></h:messages>
		<br></br>
		<br></br>

		<h:outputLabel value="Código: " />
		<br></br>
		<h:inputText id="codigo" value="#{condominioControlador.novoCondominio.codigo}" required="true"
			requiredMessage="O código deve ser informado" />
		<h:message for="codigo"></h:message>
		<br></br>

		<h:outputLabel value="Nome: " />
		<br></br>
		<h:inputText id="nome" value="#{condominioControlador.novoCondominio.nome}" required="true"
			requiredMessage="O nome deve ser informado" />
		<h:message for="nome"></h:message>
		<br></br>
		<br></br>

		<h:commandButton value="Gravar" action="#{condominioControlador.gravar}" />
		<br></br>
		<br></br>

		<h:commandButton value="Voltar" immediate="true" action="menuprincipal.xhtml"
			onclick="return confirm('Deseja cancelar o cadastro?')" />
	</h:form>
</h:body>

</html>
