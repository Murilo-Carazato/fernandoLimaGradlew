<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://java.sun.com/jsf/core" xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets" xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <title>Cadastro de casa</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</h:head>
<h:body>
    <h:form id="formulario">
        <h:outputLabel value="Cadastro de Casa"></h:outputLabel>
        <h:messages globalOnly="true"></h:messages>
        <br></br>
        <br></br>
        <h:outputLabel value="ID"></h:outputLabel>
        <br></br>
        <h:inputText id="id" value="#{casaControlador.novaCasa.codigo}" required="true"
            requiredMessage="Id deve ser informado"></h:inputText>
        <h:message for="id"></h:message>
        <br></br>
        <h:outputLabel value="Nome"></h:outputLabel>
        <br></br>
        <h:inputText id="nome" value="#{casaControlador.novaCasa.nome}" required="true"
            requiredMessage="O nome deve ser informado"></h:inputText>
        <h:message for="nome"></h:message>
        <br></br>
        <br></br>
        <h:outputLabel value="Condominio"></h:outputLabel>
        <br></br>
        <h:selectOneMenu value="#{casaControlador.idSelecionadoCondominio}">
            <f:selectItems value="#{casaControlador.condominios}" var="e" itemLabel="#{e.nome}" itemValue="#{e.codigo}">
            </f:selectItems>
        </h:selectOneMenu>
        <br></br>
        <br></br>
        <h:commandButton value="Gravar" action="#{casaControlador.gravar()}">
        </h:commandButton>
        <br></br>
        <br></br>
        <h:commandButton value="Voltar" immediate="true" action="menuprincipal.xhtml"
            onclick="return confirm('Deseja cancelar o cadastro?')">
        </h:commandButton>
    </h:form>
</h:body>

</html>
